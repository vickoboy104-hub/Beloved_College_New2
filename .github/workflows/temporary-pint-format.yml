name: One-time Pint formatter

on:
  push:
    branches:
      - workflows/learning-results-cbt

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: workflows/learning-results-cbt

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Format PHP
        run: ./vendor/bin/pint

      - name: Remove temporary workflow
        run: rm .github/workflows/temporary-pint-format.yml

      - name: Commit formatting
        run: |
          git config user.name "Beloved College CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: apply Laravel Pint formatting"
          git push origin HEAD:workflows/learning-results-cbt
