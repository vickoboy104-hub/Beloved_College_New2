name: Laravel CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_sqlite, bcmath, gd, zip
          coverage: none
          tools: composer:v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Apply one-time formatting and restore CI
        if: github.event_name == 'pull_request'
        run: |
          vendor/bin/pint
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/temporary-pint-format.yml
          git config user.name "Beloved College CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: apply Laravel Pint formatting"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Check PHP formatting
        run: vendor/bin/pint --test

      - name: Run automated tests
        run: php artisan test
