name: Bootstrap Laravel Foundation

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bootstrap-laravel.yml'

permissions:
  contents: write

jobs:
  bootstrap:
    if: ${{ !contains(github.event.head_commit.message, '[bootstrap-complete]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stop when Laravel already exists
        if: ${{ hashFiles('composer.json') != '' }}
        run: |
          echo "Laravel is already initialized."
          exit 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_mysql, pdo_sqlite, bcmath, gd, zip
          coverage: none
          tools: composer:v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: scaffold/package-lock.json

      - name: Create Laravel 13 application
        run: composer create-project laravel/laravel:^13.0 scaffold --prefer-dist --no-interaction

      - name: Install Livewire 4
        working-directory: scaffold
        run: composer require livewire/livewire:^4.0 --no-interaction

      - name: Build frontend assets
        working-directory: scaffold
        run: |
          npm install
          npm run build

      - name: Run framework tests
        working-directory: scaffold
        run: php artisan test

      - name: Copy application into repository
        run: |
          rsync -a \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='node_modules' \
            scaffold/ ./
          rm -rf scaffold
          rm -f .github/workflows/bootstrap-laravel.yml

      - name: Add continuous integration workflow
        run: |
          mkdir -p .github/workflows
          cat > .github/workflows/ci.yml <<'YAML'
          name: Laravel CI

          on:
            push:
              branches: [main, develop]
            pull_request:
              branches: [main]

          permissions:
            contents: read

          jobs:
            test:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: shivammathur/setup-php@v2
                  with:
                    php-version: '8.4'
                    extensions: mbstring, intl, pdo_sqlite, bcmath, gd, zip
                    coverage: none
                    tools: composer:v2
                - uses: actions/setup-node@v4
                  with:
                    node-version: '22'
                    cache: npm
                - run: composer install --no-interaction --prefer-dist --no-progress
                - run: cp .env.example .env
                - run: php artisan key:generate
                - run: npm ci
                - run: npm run build
                - run: php artisan test
          YAML

      - name: Commit Laravel foundation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bootstrap Laravel 13 and Livewire 4 foundation [bootstrap-complete]"
          git push origin main
