name: Bootstrap Laravel Foundation

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bootstrap-laravel.yml'

permissions:
  contents: write

jobs:
  bootstrap:
    if: ${{ !contains(github.event.head_commit.message, '[bootstrap-complete]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_mysql, pdo_sqlite, bcmath, gd, zip
          coverage: none
          tools: composer:v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create Laravel 13 application
        run: composer create-project laravel/laravel:^13.0 scaffold --prefer-dist --no-interaction

      - name: Install Livewire 4
        working-directory: scaffold
        run: composer require livewire/livewire:^4.0 --no-interaction

      - name: Build frontend assets
        working-directory: scaffold
        run: |
          npm install
          npm run build

      - name: Run framework tests
        working-directory: scaffold
        run: php artisan test

      - name: Copy application into repository
        run: |
          rsync -a \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='node_modules' \
            scaffold/ ./
          rm -rf scaffold

      - name: Commit Laravel foundation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bootstrap Laravel 13 and Livewire 4 foundation [bootstrap-complete]"
          git push origin main
